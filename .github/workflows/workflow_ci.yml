name: ML Training CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'Workflow-CI/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas numpy matplotlib seaborn

      # Sesuaikan path foldernya dengan struktur Anda (Misal: Workflow-CI)
      - name: Run MLflow Project
        working-directory: Workflow-CI
        run: |
          python modelling.py

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: Workflow-CI/mlruns/

      - name: Save model artifacts to repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Copy artifacts
          mkdir -p saved_artifacts
          cp -r Workflow-CI/mlruns/ saved_artifacts/ 2>/dev/null || true
          
          git add saved_artifacts/ || true
          git diff --cached --quiet || git commit -m "CI: Update model artifacts"
          git push || true

  # ============================
  # ADVANCED: Build Docker Image
  # ============================
  build-docker:
    needs: train-model
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MLflow
        run: pip install mlflow scikit-learn pandas numpy

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: adh1mzz
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image with MLflow
        run: |
          # Cari model path terbaru
          MODEL_PATH=$(find mlruns -name "model" -type d | head -1)
          if [ -n "$MODEL_PATH" ]; then
            mlflow models build-docker -m "$MODEL_PATH" -n "adh1mzz/heart-failure-model:latest"
            docker push "adh1mzz/heart-failure-model:latest"
          else
            echo "No model found, skipping Docker build"
          fi