name: Workflow CI MLflow

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn matplotlib seaborn

      - name: Run MLflow Project (Training Model)
        run: |
          echo "Menjalankan training otomatis menggunakan MLflow Project..."
          mlflow run . --env-manager local

      - name: Upload Artefak Model ke GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: mlruns/

      - name: Login ke Docker Hub
        uses: docker/login-action@v3
        with:
          username: adh1mzz
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build dan Push Docker Image
        run: |
          echo "Mencari path model terbaru..."
          # Mencari path model secara dinamis dari hasil training sebelumnya
          MODEL_PATH=$(find mlruns -name "model" -type d | head -1)

          if [ -n "$MODEL_PATH" ]; then
            echo "✓ Model ditemukan di: $MODEL_PATH"
            ABSOLUTE_MODEL_PATH="$(pwd)/$MODEL_PATH"
            
            echo "✓ Building Docker image..."
            # Build Docker image menggunakan mlflow
            mlflow models build-docker \
              -m "file://$ABSOLUTE_MODEL_PATH" \
              -n adh1mzz/heart-failure-model:latest \
              --enable-mlserver

            echo "✓ Pushing ke Docker Hub..."
            docker push adh1mzz/heart-failure-model:latest
            echo "✓ Docker image berhasil di-push!"
          else
            echo "⚠ Model tidak ditemukan, pastikan proses training berhasil."
            exit 1
          fi
